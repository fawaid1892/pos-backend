services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pos_multi_branch?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-default-dev-secret}
      PORT: 8080
      ELECTRIC_URL: https://api.electric-sql.cloud
      ELECTRIC_TOKEN: ${ELECTRIC_TOKEN}
    restart: unless-stopped

volumes:
  pgdata:
