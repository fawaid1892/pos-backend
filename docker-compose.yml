services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: pos_multi_branch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    command:
      - -c wal_level=logical

  electric:
    image: electricsql/electric:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pos_multi_branch
      ELECTRIC_HOST: 0.0.0.0
    ports:
      - "5133:5133"
    depends_on:
      - postgres

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pos_multi_branch
      JWT_SECRET: ${JWT_SECRET}
      PORT: 8080
    depends_on:
      - postgres
      - electric

volumes:
  pgdata:
